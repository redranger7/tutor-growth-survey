<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tutor Growth Assessment 2026 | Professional SaaS Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070C1F; font-family: 'Inter', sans-serif; color: #F0F4FF; overflow-x: hidden; }
    .app { max-width: 550px; margin: 0 auto; min-height: 100vh; background: radial-gradient(circle at 10% 20%, #0B132B, #050A18); display: flex; flex-direction: column; }
    .progress-section { padding: 16px 20px 8px 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #98A9C7; margin-bottom: 8px; }
    .time-badge { background: rgba(45,212,191,0.15); padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 500; color: #5EEAD4; }
    .progress-bar-bg { background: #1E2A47; border-radius: 40px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; border-radius: 40px; background: linear-gradient(90deg, #2DD4BF, #14B8A6, #2DD4BF); background-size: 200% auto; transition: width 0.5s cubic-bezier(0.2,0.9,0.4,1.2); }
    .slides-container { flex: 1; overflow: hidden; position: relative; }
    .slides-track { display: flex; transition: transform 0.4s cubic-bezier(0.2,0.85,0.4,1); will-change: transform; }
    .slide { flex: 0 0 100%; padding: 12px 20px 20px 20px; }
    .card { background: rgba(12,22,45,0.85); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); border-radius: 32px; padding: 28px 24px; border: 1px solid rgba(45,212,191,0.25); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5); }
    h2 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg,#FFF,#A5F3EE); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; letter-spacing: -0.3px; }
    .welcome-icon { text-align: center; margin: 16px 0; }
    .welcome-icon i { font-size: 3rem; color: #5EEAD4; }
    .welcome-text { margin: 14px 0; font-size: 0.95rem; line-height: 1.5; color: #CDDFFF; }
    .benefits-list { background: rgba(45,212,191,0.08); border-radius: 24px; padding: 16px 18px; margin: 18px 0; display: flex; flex-direction: column; gap: 10px; }
    .benefit-item { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: #E0F2FE; }
    .benefit-item i { width: 22px; color: #5EEAD4; font-size: 0.9rem; }
    .question-text { font-size: 1.3rem; font-weight: 600; line-height: 1.4; margin-bottom: 18px; }
    .question-text i { color: #5EEAD4; margin-right: 10px; font-size: 1.2rem; }
    .tournament-question { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 18px; color: #E0F2FE; background: rgba(45,212,191,0.1); padding: 12px; border-radius: 28px; }
    .matchup-label { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; color: #5EEAD4; background: rgba(45,212,191,0.12); display: inline-block; width: auto; padding: 4px 16px; border-radius: 40px; margin-left: auto; margin-right: auto; }
    .multi-hint { font-size: 11px; margin-bottom: 16px; color: #7F9BCB; display: flex; align-items: center; gap: 8px; background: rgba(45,212,191,0.08); padding: 5px 10px; border-radius: 40px; width: fit-content; }
    .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .option-btn { background: #0F1A36; border: 1px solid #2C3E66; border-radius: 50px; padding: 13px 16px; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #E2ECFF; transition: all 0.2s ease; }
    .option-btn i:first-child { width: 24px; font-size: 1rem; color: #5EEAD4; }
    .option-btn .check-icon { margin-left: auto; color: #2DD4BF; font-size: 0.9rem; }
    .option-btn.selected { background: #1E3A5F; border-color: #2DD4BF; box-shadow: 0 0 0 2px rgba(45,212,191,0.4); }
    .reset-btn { background: rgba(255,255,255,0.05); border: 1px solid #FF6B6B40; border-radius: 40px; padding: 7px 12px; font-size: 10px; color: #FFA6A6; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; transition: 0.2s; }
    .reset-btn:hover { background: rgba(255,107,107,0.15); }
    .matchup-card { background: linear-gradient(145deg,#0C1535,#07102A); border-radius: 32px; padding: 20px 16px; margin-bottom: 14px; border: 1px solid rgba(45,212,191,0.3); transition: all 0.3s; }
    .matchup-card.matchup-transition { animation: cardPulse 0.5s cubic-bezier(0.2,0.9,0.6,1.1); }
    @keyframes cardPulse { 0% { transform: scale(0.98); opacity: 0.6; box-shadow: 0 0 0 0 #2DD4BF; } 70% { transform: scale(1.01); box-shadow: 0 0 0 6px rgba(45,212,191,0.2); } 100% { transform: scale(1); opacity: 1; } }
    .vs-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .vs-option { background: #101B3C; border-radius: 26px; padding: 16px 10px; flex: 1; text-align: center; cursor: pointer; transition: all 0.2s ease; border: 1px solid #2C4070; }
    .vs-option i { font-size: 1.6rem; display: block; margin-bottom: 10px; color: #5EEAD4; }
    .vs-option strong { font-size: 0.85rem; display: block; font-weight: 600; }
    .vs-option.selected { background: linear-gradient(135deg,#1B4E5F,#0F3A48); border-color: #5EEAD4; box-shadow: 0 0 10px rgba(45,212,191,0.6); transform: scale(1.01); }
    .vs-middle { font-weight: 800; font-size: 0.9rem; background: #2DD4BF20; padding: 5px 8px; border-radius: 50px; color: #7EF4E2; }
    .rating-scale { display: flex; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
    .rating-btn { background: #0F1A36; border-radius: 50px; padding: 10px 0; flex: 1; text-align: center; font-weight: 600; cursor: pointer; transition: 0.1s; border: 1px solid #2C3E66; font-size: 0.75rem; line-height: 1.3; }
    .rating-btn.selected { background: #2DD4BF; color: #0A1128; box-shadow: 0 0 6px #2DD4BF; border-color: #2DD4BF; }
    .sticky-next { background: #050C1C; padding: 10px 20px 18px; border-top: 1px solid #1F2D4A; }
    .next-btn { background: linear-gradient(90deg,#2DD4BF,#14B8A6); border: none; width: 100%; padding: 14px 0; border-radius: 60px; font-weight: 700; font-size: 0.95rem; color: #0A1128; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .next-btn:active { transform: scale(0.97); }
    .next-btn.disabled { opacity: 0.4; pointer-events: none; cursor: not-allowed; }
    .next-btn.submitting { opacity: 0.7; pointer-events: none; }
    .next-btn.submitting i.fa-arrow-right { display: none; }
    .next-btn.submitting::after { content: ""; width: 18px; height: 18px; border: 2px solid #0A1128; border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite; margin-left: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .insight-card { background: rgba(13,28,55,0.8); border-radius: 22px; padding: 12px; margin: 10px 0; border-left: 4px solid #2DD4BF; font-size: 0.85rem; }
    input, textarea { background: #0F1A36; border: 1px solid #2C4468; border-radius: 50px; padding: 13px 16px; width: 100%; color: white; font-size: 0.9rem; margin-bottom: 10px; font-family: 'Inter', sans-serif; }
    textarea { border-radius: 20px; resize: vertical; }
    footer { font-size: 9px; text-align: center; padding: 8px; color: #4A5B7A; }
    .hidden-next { display: none !important; }
    .optional-badge { font-size: 10px; background: rgba(45,212,191,0.15); padding: 2px 8px; border-radius: 30px; margin-left: 8px; font-weight: normal; }
    @media (max-width:480px){ .card{padding:20px 16px;} .question-text{font-size:1.15rem;} .tournament-question{font-size:1.15rem;} .option-btn{padding:11px 14px;font-size:0.8rem;} .vs-option{padding:12px 8px;} .vs-option i{font-size:1.3rem;} .welcome-text{font-size:0.85rem;} .rating-btn{font-size:0.65rem;} }
  </style>
</head>
<body>
<div class="app">
  <div class="progress-section">
    <div class="progress-label"><span><i class="fas fa-chart-line"></i> Your growth journey</span><span class="time-badge"><i class="far fa-hourglass-half"></i> ~3 min</span></div>
    <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="slides-container"><div class="slides-track" id="slidesTrack"></div></div>
  <div class="sticky-next" id="stickyNextContainer"><button class="next-btn disabled" id="nextBtn"><i class="fas fa-arrow-right"></i> Next</button></div>
  <footer>Professional assessment · actionable insights</footer>
</div>

<script>
  // ============================================================
  // CONFIGURATION
  // ============================================================
  const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz9LAqBmra_NSatNCnDT62SqtTyu-PfOQVxLXqTolU3hEBEghVDOWhgGC7L0kTPYsGU/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const SOURCE = urlParams.get('source') || 'direct';
  const startTime = new Date();
  let surveyCompleted = false;
  let tournamentHistory = { round1: null, round2: null, round3: null, round4: null };
  
  // Survey screens
  const screens = [
    { id: 'welcome', type: 'welcome' },
    { id: 'studentCount', type: 'single', question: 'How many active students do you currently teach?', options: ['1-10','11-20','21-50','51-100','100+'], key: 'students', icon: 'fa-users', required: 1 },
    { id: 'subject', type: 'single', question: 'What do you primarily teach?', options: ['School Tuition','JEE / NEET','Competitive Exams','Languages','Commerce / CA','Other'], key: 'subject', icon: 'fa-graduation-cap', required: 1 },
    { id: 'teachingMode', type: 'single', question: 'How do you teach?', options: ['Offline (in-person)','Online (virtual)','Hybrid (both)'], key: 'teachingMode', icon: 'fa-laptop-house', required: 1 },
    { id: 'topGoals', type: 'multi', max: 3, min: 3, question: 'What are your TOP 3 goals for the next 6 months?', options: ['More Students','Better Student Results','Better Parent Trust','Higher Student Retention','Higher Fees','Less Workload'], key: 'goals', icon: 'fa-bullseye', hint: 'Select exactly 3' },
    { id: 'topFrustrations', type: 'multi', max: 2, min: 2, question: 'Which TWO problems frustrate you the most every week?', options: ['Students performing poorly','Tracking progress across many students','Students not completing homework','Parents asking repeated questions','Students leaving tuition','Creating homework or tests','Getting new admissions'], key: 'headaches', icon: 'fa-head-side-vr', hint: 'Select exactly 2' },
    { id: 'magicFix', type: 'single', question: 'If you could magically fix ONE thing about your tuition business tomorrow, what would it be?', options: ['Students completing homework','Better student results','More admissions','Less administrative work','Better parent trust','Higher student retention'], key: 'magicFix', icon: 'fa-wand-magic', required: 1 },
    { id: 'homeworkWorkflow', type: 'single', question: 'How do you currently assign and track homework?', options: ['WhatsApp/Email','Physical notebook','Google Classroom','Manual tracking sheet','Dedicated tutor app','I don\'t assign homework'], key: 'homeworkMethod', icon: 'fa-book-open', required: 1 },
    { id: 'studentManagementTool', type: 'single', question: 'What tool do you use most for managing students?', options: ['WhatsApp','Notebook/Diary','Excel/Sheets','Teachmint','Classplus','Google Forms','Other / None'], key: 'managementTool', icon: 'fa-toolbox', required: 1 },
    { id: 'progressTracking', type: 'single', question: 'How do you track student progress over time?', options: ['Mental notes','Physical notebook','Excel spreadsheet','Tutor management app','Parent feedback only','I don\'t track systematically'], key: 'progressMethod', icon: 'fa-chart-line', required: 1 },
    { id: 'diagnosisMethod', type: 'single', question: 'How do you usually identify struggling students?', options: ['Homework','Tests','Class Observation','Experience / Intuition','Parent Feedback','Usually after exam results'], key: 'diagnosisMethod', icon: 'fa-stethoscope', required: 1 },
    { id: 'confidence', type: 'rating', question: 'How confident are you in identifying weak students BEFORE exam results?', range: [1,2,3,4,5], labels: ['Usually notice after exams','Sometimes see early signs','Moderately confident','Often identify early','Usually identify very early'], key: 'confidence', icon: 'fa-chart-simple', required: 1 },
    { id: 'improvementTournament', type: 'improvementTournament' },
    { id: 'interest', type: 'single', question: 'Imagine a platform that helps tutors: ✓ Understand student progress ✓ Identify struggling students earlier ✓ Reduce manual work ✓ Communicate professionally. How interested would you be?', options: ['Not Interested','Slightly Interested','Interested','Very Interested','Extremely Interested'], key: 'interest', icon: 'fa-lightbulb', required: 1 },
    { id: 'pricing', type: 'single', question: 'If such a platform genuinely helped save time and improve student tracking, what would feel reasonable?', options: ['₹99/month','₹199/month','₹299/month','₹499/month','₹999+/month','Would try free pilot first','Would Not Pay'], key: 'pricing', icon: 'fa-tag', required: 1 },
    { id: 'result', type: 'result' },
    { id: 'earlyAccess', type: 'earlyAccess' },
    { id: 'contactDetails', type: 'contact' },
    { id: 'openQuestion', type: 'openQuestion' },
    { id: 'thankYou', type: 'thankYou' }
  ];

  let currentIndex = 0;
  let answers = {
    students: null, subject: null, teachingMode: null, goals: [], headaches: [], magicFix: null,
    homeworkMethod: null, managementTool: null, progressMethod: null, diagnosisMethod: null,
    confidence: null, improvementWinner: null, interest: null, pricing: null,
    earlyAccess: { interested: null }, contact: { name: '', whatsapp: '', city: '', studentCount: '' }, wish: ''
  };

  let improvementStage = 0, improvementWinner = null, matchupTransitionEffect = false;

  const improvementMatchups = [
    { a: 'Understand students better', b: 'Save time', iconA: 'fa-brain', iconB: 'fa-clock' },
    { a: null, b: 'Reduce parent questions', iconA: null, iconB: 'fa-message' },
    { a: null, b: 'Reduce student dropouts', iconA: null, iconB: 'fa-heart' },
    { a: null, b: 'Get more admissions', iconA: null, iconB: 'fa-user-plus' }
  ];

  const answerScreens = screens.filter(s => !['welcome','result','thankYou','earlyAccess','contactDetails','openQuestion'].includes(s.type));
  const totalAnswerScreens = answerScreens.length;

  function getCompletedAnswerCount() {
    let count = 0;
    for (let i = 0; i < currentIndex; i++) {
      const screen = screens[i];
      if (!screen) continue;
      if (screen.type === 'single' && answers[screen.key]) count++;
      else if (screen.type === 'multi' && answers[screen.key] && answers[screen.key].length === screen.max) count++;
      else if (screen.type === 'rating' && answers.confidence !== null && screen.key === 'confidence') count++;
      else if (screen.type === 'improvementTournament' && answers.improvementWinner) count++;
      else if (['subject','teachingMode','magicFix','homeworkMethod','managementTool','progressMethod','diagnosisMethod','interest','pricing'].includes(screen.key) && answers[screen.key]) count++;
    }
    return count;
  }

  function updateProgress() { document.getElementById('progressFill').style.width = `${(getCompletedAnswerCount() / totalAnswerScreens) * 100}%`; }

  function isCurrentScreenAnswered() {
    const screen = screens[currentIndex];
    if (!screen) return false;
    if (screen.type === 'welcome') return true;
    if (screen.type === 'single') return !!answers[screen.key];
    if (screen.type === 'multi') return answers[screen.key] && answers[screen.key].length === screen.max;
    if (screen.type === 'rating') return answers.confidence !== null;
    if (screen.type === 'improvementTournament') return answers.improvementWinner !== null;
    if (screen.type === 'result') return true;
    if (screen.type === 'earlyAccess') return answers.earlyAccess.interested !== null;
    if (screen.type === 'contact') {
      if (answers.earlyAccess.interested === 'Yes' || answers.earlyAccess.interested === 'Maybe')
        return answers.contact.name.trim() !== '' && answers.contact.whatsapp.trim() !== '';
      return true;
    }
    if (screen.type === 'openQuestion') return true;
    if (screen.type === 'thankYou') return true;
    return false;
  }

  function updateNextButton() {
    const nextBtn = document.getElementById('nextBtn');
    const stickyContainer = document.getElementById('stickyNextContainer');
    const screen = screens[currentIndex];
    if (!screen) return;
    if (screen.type === 'welcome' || screen.type === 'thankYou') stickyContainer.classList.add('hidden-next');
    else stickyContainer.classList.remove('hidden-next');
    const isValid = isCurrentScreenAnswered();
    if (nextBtn) isValid ? nextBtn.classList.remove('disabled') : nextBtn.classList.add('disabled');
  }

  function recordTournamentRound(round, winner) { tournamentHistory[`round${round}`] = winner; console.log(`✅ Tournament Round ${round} recorded: ${winner}`); }
  function getCompletionTime() { const diff = Math.round((new Date() - startTime) / 1000); return `${Math.floor(diff/60)}m ${diff%60}s`; }

  function saveAllResponses() {
    return fetch(WEBHOOK_URL, {
      method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        timestamp: new Date().toISOString(), source: SOURCE, completionTime: getCompletionTime(),
        students: answers.students, subject: answers.subject, teachingMode: answers.teachingMode,
        goals: answers.goals, headaches: answers.headaches, magicFix: answers.magicFix,
        homeworkMethod: answers.homeworkMethod, managementTool: answers.managementTool,
        progressMethod: answers.progressMethod, diagnosisMethod: answers.diagnosisMethod,
        confidence: answers.confidence, tournamentRound1: tournamentHistory.round1,
        tournamentRound2: tournamentHistory.round2, tournamentRound3: tournamentHistory.round3,
        tournamentRound4: tournamentHistory.round4, finalImprovementWinner: answers.improvementWinner,
        interest: answers.interest, pricing: answers.pricing, earlyAccess: answers.earlyAccess.interested,
        name: answers.contact.name, whatsapp: answers.contact.whatsapp, city: answers.contact.city,
        studentCount: answers.contact.studentCount, wish: answers.wish
      })
    });
  }

  function generateDynamicInsight() {
    const hasLowConfidence = answers.confidence && answers.confidence <= 2;
    const hasTrackingPain = answers.headaches.includes('Tracking progress across many students');
    const hasParentPain = answers.headaches.includes('Parents asking repeated questions');
    const hasHomeworkPain = answers.headaches.includes('Students not completing homework');
    const usesManualTracking = ['Mental notes','Physical notebook',"I don't track systematically"].includes(answers.progressMethod);
    if (hasLowConfidence || hasTrackingPain) return { growthOpportunity: 'Earlier identification of struggling students before they fall behind', recommendedFocus: 'Set up a simple weekly check-in system for each student\'s progress' };
    if (hasParentPain) return { growthOpportunity: 'Structured parent communication to reduce repetitive questions', recommendedFocus: 'Create automated weekly progress summaries for parents' };
    if (hasHomeworkPain) return { growthOpportunity: 'Homework completion system that tracks submissions automatically', recommendedFocus: 'Implement digital homework tracking with reminders' };
    if (usesManualTracking) return { growthOpportunity: 'Moving from manual to digital student tracking', recommendedFocus: 'Start with a simple spreadsheet before upgrading to dedicated tools' };
    return { growthOpportunity: 'Optimizing your existing workflow for better student outcomes', recommendedFocus: 'Identify one bottleneck in your current process and test a solution' };
  }

  function getOptionIcon(screenId, opt) {
    const icons = {
      'More Students':'fa-user-plus','Better Student Results':'fa-chart-line','Better Parent Trust':'fa-handshake',
      'Higher Student Retention':'fa-heart','Higher Fees':'fa-rupee-sign','Less Workload':'fa-clock',
      'Students performing poorly':'fa-chart-simple','Tracking progress across many students':'fa-chart-line',
      'Students not completing homework':'fa-book-open','Parents asking repeated questions':'fa-message',
      'Students leaving tuition':'fa-door-open','Creating homework or tests':'fa-pen-ruler',
      'Getting new admissions':'fa-user-plus','Students completing homework':'fa-check-circle',
      'Better student results':'fa-chart-line','More admissions':'fa-user-plus','Less administrative work':'fa-clock',
      'Better parent trust':'fa-handshake','Higher student retention':'fa-heart','Homework':'fa-book',
      'Tests':'fa-file-alt','Class Observation':'fa-eye','Experience / Intuition':'fa-brain',
      'Parent Feedback':'fa-comment','Usually after exam results':'fa-calendar','WhatsApp/Email':'fa-whatsapp',
      'Physical notebook':'fa-book','Google Classroom':'fa-google','Manual tracking sheet':'fa-table',
      'Dedicated tutor app':'fa-mobile-alt',"I don't assign homework":'fa-ban','WhatsApp':'fa-whatsapp',
      'Notebook/Diary':'fa-book','Excel/Sheets':'fa-file-excel','Teachmint':'fa-chalkboard-user',
      'Classplus':'fa-mobile-alt','Google Forms':'fa-google','Other / None':'fa-question',
      'Mental notes':'fa-brain','Tutor management app':'fa-app-store','Parent feedback only':'fa-comment',
      "I don't track systematically":'fa-chart-simple','School Tuition':'fa-school','JEE / NEET':'fa-flask',
      'Competitive Exams':'fa-trophy','Languages':'fa-language','Commerce / CA':'fa-chart-pie',
      'Other':'fa-ellipsis-h','Offline (in-person)':'fa-building','Online (virtual)':'fa-laptop','Hybrid (both)':'fa-exchange-alt'
    };
    return icons[opt] || 'fa-circle-question';
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  function renderImprovementTournament() {
    const matchup = improvementMatchups[improvementStage];
    let left = matchup.a, right = matchup.b, leftIcon = matchup.iconA, rightIcon = matchup.iconB;
    if (improvementStage === 1) { left = improvementWinner || 'Understand students better'; leftIcon = improvementWinner === 'Understand students better' ? 'fa-brain' : 'fa-clock'; }
    if (improvementStage === 2) { left = improvementWinner; leftIcon = improvementWinner === 'Save time' ? 'fa-clock' : 'fa-brain'; }
    if (improvementStage === 3) { left = improvementWinner; leftIcon = improvementWinner === 'Reduce parent questions' ? 'fa-message' : 'fa-clock'; }
    const stepNames = ['Round 1 · Quarterfinal', 'Round 2 · Semifinal', 'Round 3 · Semifinal', 'Round 4 · Final'];
    return `<div class="card"><div class="tournament-question"><i class="fas fa-chart-line"></i> Which improvement sounds most valuable to you?</div><div class="matchup-label">${stepNames[improvementStage]} · Value Showdown</div><div class="matchup-card"><div class="vs-row"><div class="vs-option" data-matchup-type="improvement" data-choice="left"><i class="fas ${leftIcon}"></i><strong>${left}</strong></div><div class="vs-middle">VS</div><div class="vs-option" data-matchup-type="improvement" data-choice="right"><i class="fas ${rightIcon}"></i><strong>${right}</strong></div></div></div><div class="multi-hint" style="justify-content:center;"><i class="fas fa-hand-pointer"></i> Tap the improvement that matters more to you</div></div>`;
  }

  function handleImprovementTournamentSelection(chosenValue) {
    improvementWinner = chosenValue;
    recordTournamentRound(improvementStage + 1, chosenValue);
    if (improvementStage < 3) { improvementStage++; matchupTransitionEffect = true; renderSlide(); }
    else { answers.improvementWinner = improvementWinner; currentIndex = screens.findIndex(s => s.id === 'interest'); improvementStage = 0; improvementWinner = null; renderSlide(); }
  }

  function renderScreenContent(screen) {
    if (screen.type === 'welcome') return `<div class="card"><h2>Tutor Growth Assessment 2026</h2><div class="welcome-icon"><i class="fas fa-chalkboard-user"></i></div><div class="welcome-text">Most tutors focus on teaching, but small improvements in student tracking, parent communication, and retention can create significant long-term growth.</div><div class="welcome-text">Take this quick assessment to discover your biggest growth opportunities and compare your workflow with other tutors.</div><div class="benefits-list"><div class="benefit-item"><i class="far fa-clock"></i> <span>Takes less than 3 minutes</span></div><div class="benefit-item"><i class="fas fa-chart-line"></i> <span>Personalized Tutor Growth Snapshot</span></div><div class="benefit-item"><i class="fas fa-rocket"></i> <span>Early access to upcoming tutor tools</span></div></div><button class="next-btn" id="startWelcomeBtn" style="background:#2DD4BF; display:inline-flex; width:auto; padding:12px 28px; margin:0 auto;">Start Assessment <i class="fas fa-arrow-right"></i></button></div>`;
    if (screen.type === 'single') {
      const selected = answers[screen.key];
      return `<div class="card"><div class="question-text"><i class="fas ${screen.icon}"></i> ${screen.question}</div><div class="options-grid">${screen.options.map(opt => `<div class="option-btn ${selected === opt ? 'selected' : ''}" data-value="${opt}"><i class="fas ${getOptionIcon(screen.id, opt)}"></i><span>${opt}</span>${selected === opt ? '<i class="fas fa-check-circle check-icon"></i>' : ''}</div>`).join('')}</div><div class="reset-btn" data-reset="true"><i class="fas fa-undo-alt"></i> Reset selection</div></div>`;
    }
    if (screen.type === 'multi') {
      const selectedArr = answers[screen.key] || [];
      return `<div class="card"><div class="question-text"><i class="fas ${screen.icon}"></i> ${screen.question}</div><div class="multi-hint"><i class="fas fa-info-circle"></i> ${screen.hint} · Tap again to deselect</div><div class="options-grid">${screen.options.map(opt => `<div class="option-btn ${selectedArr.includes(opt) ? 'selected' : ''}" data-value="${opt}"><i class="fas ${getOptionIcon(screen.id, opt)}"></i><span>${opt}</span>${selectedArr.includes(opt) ? '<i class="fas fa-check-circle check-icon"></i>' : ''}</div>`).join('')}</div><div class="reset-btn" data-reset="true"><i class="fas fa-undo-alt"></i> Reset all selections</div></div>`;
    }
    if (screen.type === 'rating') {
      const ratingVal = answers.confidence;
      return `<div class="card"><div class="question-text"><i class="fas fa-chart-simple"></i> ${screen.question}</div><div class="rating-scale">${screen.range.map(r => `<div class="rating-btn ${ratingVal === r ? 'selected' : ''}" data-rating="${r}">${r}<br><span style="font-size:0.6rem; font-weight:normal;">${screen.labels[r-1]}</span></div>`).join('')}</div><div class="reset-btn" data-reset="true"><i class="fas fa-undo-alt"></i> Reset</div></div>`;
    }
    if (screen.type === 'improvementTournament') return renderImprovementTournament();
    if (screen.type === 'result') {
      const insight = generateDynamicInsight();
      return `<div class="card"><h2>✨ Your Tutor Growth Snapshot</h2><div class="insight-card"><i class="fas fa-bullseye"></i> <strong>Your Top Goals</strong><br>→ ${answers.goals.join(', ') || 'Better Student Results'}</div><div class="insight-card"><i class="fas fa-wand-magic"></i> <strong>Your Magic Fix</strong><br>→ ${answers.magicFix || 'Better student results'}</div><div class="insight-card"><i class="fas fa-head-side-vr"></i> <strong>Biggest Challenges</strong><br>→ ${answers.headaches.join(', ') || 'Tracking Progress'}</div><div class="insight-card"><i class="fas fa-toolbox"></i> <strong>Current Tool</strong><br>→ ${answers.managementTool || 'Not specified'}</div><div class="insight-card"><i class="fas fa-chart-simple"></i> <strong>Confidence Level</strong><br>→ ${answers.confidence ? ['Usually notice after exams','Sometimes see early signs','Moderately confident','Often identify early','Usually identify very early'][answers.confidence-1] : 'Moderate'}</div><div class="insight-card"><i class="fas fa-chart-line"></i> <strong>Growth Opportunity</strong><br>${insight.growthOpportunity}</div><div class="insight-card"><i class="fas fa-lightbulb"></i> <strong>Recommended Focus</strong><br>${insight.recommendedFocus}</div><div style="margin-top:12px; background:#0C1535; border-radius:20px; padding:10px; font-size:0.8rem;">✨ Tutors with similar student counts selected "${answers.improvementWinner || 'Student understanding'}" as their top priority.</div><button class="next-btn" id="continueToEarlyAccess" style="margin-top:16px;">Continue →</button></div>`;
    }
    if (screen.type === 'earlyAccess') {
      const selected = answers.earlyAccess.interested;
      return `<div class="card"><h2>Help Shape The Future Of Tutoring</h2><p style="margin:12px 0; font-size:0.85rem;">We're inviting a small group of tutors to test upcoming tools and provide direct feedback.</p><div style="background:#0C1535; border-radius:20px; padding:10px; margin-bottom:14px; font-size:0.8rem;"><i class="fas fa-gem"></i> Free Pilot Access &nbsp; <i class="fas fa-headset"></i> Personalized Support &nbsp; <i class="fas fa-comment"></i> Direct Influence</div><div class="options-grid"><div class="option-btn ${selected === 'Yes' ? 'selected' : ''}" data-ea="Yes"><i class="fas fa-thumbs-up"></i> Yes, reserve my spot</div><div class="option-btn ${selected === 'Maybe' ? 'selected' : ''}" data-ea="Maybe"><i class="fas fa-pause"></i> Maybe, tell me more</div><div class="option-btn ${selected === 'No' ? 'selected' : ''}" data-ea="No"><i class="fas fa-times"></i> No thanks</div></div></div>`;
    }
    if (screen.type === 'contact') {
      const isPilot = answers.earlyAccess.interested === 'Yes' || answers.earlyAccess.interested === 'Maybe';
      return `<div class="card"><h2>🎯 Claim Your Early Access Spot</h2><p style="margin:6px 0 14px 0; font-size:0.8rem; color:#7F9BCB;">${isPilot ? 'Reserve your spot for free pilot access. We\'ll send your growth snapshot and updates via WhatsApp.' : 'Leave your details to receive your growth snapshot.'}</p><input type="text" id="contactName" placeholder="Full name ${isPilot ? '*required*' : ''}" value="${escapeHtml(answers.contact.name)}"><input type="tel" id="contactWhatsapp" placeholder="WhatsApp number ${isPilot ? '*required*' : ''}" value="${escapeHtml(answers.contact.whatsapp)}"><input type="text" id="contactCity" placeholder="City" value="${escapeHtml(answers.contact.city)}"><input type="text" id="contactStudentCount" placeholder="Student count" value="${escapeHtml(answers.contact.studentCount)}"><div class="reset-btn" data-reset-contact="true"><i class="fas fa-undo-alt"></i> Clear all fields</div></div>`;
    }
    if (screen.type === 'openQuestion') {
      return `<div class="card"><h2>One Last Question <span class="optional-badge">Optional</span></h2><div class="question-text" style="font-size:1.1rem;"><i class="fas fa-comment-dots"></i> What's one thing you wish existed for tutors today?</div><textarea id="wishText" rows="2" placeholder="Your honest answer could help shape what we build... (optional)">${escapeHtml(answers.wish)}</textarea><div class="reset-btn" data-reset-wish="true"><i class="fas fa-undo-alt"></i> Clear</div><p style="font-size:0.7rem; color:#5EEAD4; margin-top:8px;"><i class="fas fa-gem"></i> This is how we discover what no survey question asks</p></div>`;
    }
    if (screen.type === 'thankYou') {
      const optedIn = answers.earlyAccess.interested === 'Yes' || answers.earlyAccess.interested === 'Maybe';
      return `<div class="card"><h2>Thank You!</h2><div class="welcome-icon"><i class="fas fa-check-circle" style="color:#2DD4BF;"></i></div><p style="margin:12px 0; font-size:0.9rem;">Your responses have been recorded.</p><p style="margin-bottom:12px; font-size:0.9rem;">We'll use this to better understand tutor challenges and build tools that actually help.</p>${optedIn ? '<p style="font-size:0.85rem; background:#0C1535; padding:10px; border-radius:20px;"><i class="fab fa-whatsapp"></i> If you opted into early access, we\'ll contact you via WhatsApp with updates and pilot opportunities.</p>' : '<p style="font-size:0.85rem;">Thank you for your valuable feedback!</p>'}<p style="margin-top:14px; font-size:0.9rem;">Have a great teaching week.</p></div>`;
    }
    return '';
  }

  function handleSelection(btn) {
    const value = btn.getAttribute('data-value');
    const screen = screens[currentIndex];
    if (!screen) return;
    if (screen.type === 'single' && screen.key) { answers[screen.key] = value; renderSlide(); return; }
    if (screen.type === 'multi' && screen.key) {
      let arr = [...(answers[screen.key] || [])];
      if (arr.includes(value)) answers[screen.key] = arr.filter(v => v !== value);
      else if (arr.length < screen.max) answers[screen.key] = [...arr, value];
      renderSlide();
    }
  }

  function resetCurrentSelection() {
    const screen = screens[currentIndex];
    if (!screen) return;
    if (screen.type === 'multi' && screen.key) { answers[screen.key] = []; renderSlide(); }
    else if (screen.type === 'single' && screen.key) { answers[screen.key] = null; renderSlide(); }
    else if (screen.type === 'rating') { answers.confidence = null; renderSlide(); }
  }

  function renderSlide() {
    const track = document.getElementById('slidesTrack');
    if (!track) return;
    track.innerHTML = '';
    screens.forEach(screen => { const div = document.createElement('div'); div.className = 'slide'; div.innerHTML = renderScreenContent(screen); track.appendChild(div); });
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
    setTimeout(() => {
      document.querySelectorAll('.option-btn[data-value]').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); handleSelection(btn); }; });
      document.querySelectorAll('.rating-btn').forEach(btn => { btn.onclick = () => { answers.confidence = parseInt(btn.dataset.rating); renderSlide(); }; });
      document.querySelectorAll('.vs-option').forEach(opt => { opt.onclick = () => { const choice = opt.dataset.choice; const matchup = improvementMatchups[improvementStage]; let left = improvementStage === 0 ? matchup.a : (improvementWinner || matchup.a); handleImprovementTournamentSelection(choice === 'left' ? left : matchup.b); }; });
      document.querySelectorAll('[data-ea]').forEach(btn => { btn.onclick = () => { answers.earlyAccess.interested = btn.dataset.ea; currentIndex = screens.findIndex(s => s.id === (btn.dataset.ea === 'No' ? 'openQuestion' : 'contactDetails')); renderSlide(); }; });
      document.querySelectorAll('[data-reset="true"]').forEach(btn => { btn.onclick = () => resetCurrentSelection(); });
      document.querySelector('[data-reset-contact="true"]')?.addEventListener('click', () => { answers.contact = { name: '', whatsapp: '', city: '', studentCount: '' }; renderSlide(); });
      document.querySelector('[data-reset-wish="true"]')?.addEventListener('click', () => { answers.wish = ''; renderSlide(); });
      const startBtn = document.getElementById('startWelcomeBtn'); if(startBtn) startBtn.onclick = () => { currentIndex = 1; renderSlide(); };
      const continueBtn = document.getElementById('continueToEarlyAccess'); if(continueBtn) continueBtn.onclick = () => { currentIndex = screens.findIndex(s => s.id === 'earlyAccess'); renderSlide(); };
      const nameInput = document.getElementById('contactName'); if(nameInput) { nameInput.oninput = (e) => { answers.contact.name = e.target.value; updateNextButton(); }; document.getElementById('contactWhatsapp')?.addEventListener('input', (e) => { answers.contact.whatsapp = e.target.value; updateNextButton(); }); document.getElementById('contactCity')?.addEventListener('input', (e) => { answers.contact.city = e.target.value; }); document.getElementById('contactStudentCount')?.addEventListener('input', (e) => { answers.contact.studentCount = e.target.value; }); }
      const wishText = document.getElementById('wishText'); if(wishText) wishText.oninput = (e) => { answers.wish = e.target.value; };
      updateProgress(); updateNextButton();
    }, 10);
    if (matchupTransitionEffect) { const mc = document.querySelector('.matchup-card'); if(mc) { mc.classList.add('matchup-transition'); setTimeout(() => mc.classList.remove('matchup-transition'), 500); } matchupTransitionEffect = false; }
  }

  function handleNext() {
    const screen = screens[currentIndex];
    if (!screen) return;
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn && nextBtn.classList.contains('disabled')) return;
    if (screen.type === 'contact') { currentIndex = screens.findIndex(s => s.id === 'openQuestion'); renderSlide(); return; }
    if (screen.type === 'openQuestion') {
      if (surveyCompleted) return;
      surveyCompleted = true;
      nextBtn.classList.add('submitting');
      nextBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
      saveAllResponses().finally(() => { nextBtn.classList.remove('submitting'); currentIndex = screens.findIndex(s => s.id === 'thankYou'); renderSlide(); });
      return;
    }
    if (currentIndex < screens.length - 1) { currentIndex++; renderSlide(); }
  }

  document.getElementById('nextBtn').onclick = handleNext;
  console.log(`🚀 Survey ready. Source: ${SOURCE}`);
  renderSlide();
</script>
</body>
</html>
